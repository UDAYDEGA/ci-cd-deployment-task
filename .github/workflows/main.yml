name: Reusable Workflow To Deploy MuleSoft Application

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      # - name: Build JAR
      #   run: mvn clean package -DmuleDeploy

      - name: Publish to Exchange
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests \
          -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
          -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}"

  deploytoSandbox:
    needs: build
    runs-on: ubuntu-latest
    environment: Sandbox
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Deploy to Sandbox
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests -DmuleDeploy \
          -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
          -Danypoint.password="${{ secrets.PLATFORM_CLIENT_SECRET }}" \
          -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
          -Dplatform.client_id="${{ secrets.PLATFORM_CLIENT_ID }}" \
          -Dplatform.client_secret="${{ secrets.PLATFORM_CLIENT_SECRET }}" \
          -Denv="${{ secrets.MULE_ENV }}" 
