name: MuleSoft CI/CD - Deploy to All Environments

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 - Build and publish to Exchange
  # Version is set using maven versions plugin
  # before publishing so Exchange gets exact version
  # ─────────────────────────────────────────────
  build:
    name: Build & Publish to Exchange
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set version to 1.0.${{ github.run_number }}
        run: |
          mvn versions:set -DnewVersion="1.0.${{ github.run_number }}" -DgenerateBackupPoms=false

      - name: Publish to Anypoint Exchange
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests \
            -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
            -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}"

  # ─────────────────────────────────────────────
  # JOB 2 - Deploy to Sandbox
  # ─────────────────────────────────────────────
  deploy-sandbox:
    name: Deploy to Sandbox
    needs: build
    runs-on: ubuntu-latest
    environment: Sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set version to 1.0.${{ github.run_number }}
        run: mvn versions:set -DnewVersion="1.0.${{ github.run_number }}" -DgenerateBackupPoms=false

      - name: Deploy to Sandbox
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests -DmuleDeploy \
            -Dconnected.app.client_id="${{ secrets.CONNECTED_APP_ID }}" \
            -Dconnected.app.client_secret="${{ secrets.CONNECTED_APP_SECRET }}" \
            -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
            -Dplatform.client_id="${{ secrets.PLATFORM_CLIENT_ID }}" \
            -Dplatform.client_secret="${{ secrets.PLATFORM_CLIENT_SECRET }}" \
            -Denv="Sandbox"

  # ─────────────────────────────────────────────
  # JOB 3 - Deploy to Dev
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: deploy-sandbox
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set version to 1.0.${{ github.run_number }}
        run: mvn versions:set -DnewVersion="1.0.${{ github.run_number }}" -DgenerateBackupPoms=false

      - name: Deploy to Dev
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests -DmuleDeploy \
            -Dconnected.app.client_id="${{ secrets.CONNECTED_APP_ID }}" \
            -Dconnected.app.client_secret="${{ secrets.CONNECTED_APP_SECRET }}" \
            -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
            -Dplatform.client_id="${{ secrets.PLATFORM_CLIENT_ID }}" \
            -Dplatform.client_secret="${{ secrets.PLATFORM_CLIENT_SECRET }}" \
            -Denv="Dev"

  # ─────────────────────────────────────────────
  # JOB 4 - Deploy to UAT
  # ─────────────────────────────────────────────
  deploy-uat:
    name: Deploy to UAT
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: UAT
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set version to 1.0.${{ github.run_number }}
        run: mvn versions:set -DnewVersion="1.0.${{ github.run_number }}" -DgenerateBackupPoms=false

      - name: Deploy to UAT
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests -DmuleDeploy \
            -Dconnected.app.client_id="${{ secrets.CONNECTED_APP_ID }}" \
            -Dconnected.app.client_secret="${{ secrets.CONNECTED_APP_SECRET }}" \
            -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
            -Dplatform.client_id="${{ secrets.PLATFORM_CLIENT_ID }}" \
            -Dplatform.client_secret="${{ secrets.PLATFORM_CLIENT_SECRET }}" \
            -Denv="UAT"

  # ─────────────────────────────────────────────
  # JOB 5 - Deploy to Production
  # Requires manual approval in GitHub UI
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: deploy-uat
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set version to 1.0.${{ github.run_number }}
        run: mvn versions:set -DnewVersion="1.0.${{ github.run_number }}" -DgenerateBackupPoms=false

      - name: Deploy to Production
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests -DmuleDeploy \
            -Dconnected.app.client_id="${{ secrets.CONNECTED_APP_ID }}" \
            -Dconnected.app.client_secret="${{ secrets.CONNECTED_APP_SECRET }}" \
            -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
            -Dplatform.client_id="${{ secrets.PLATFORM_CLIENT_ID }}" \
            -Dplatform.client_secret="${{ secrets.PLATFORM_CLIENT_SECRET }}" \
            -Denv="Production"
