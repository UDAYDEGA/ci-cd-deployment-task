name: MuleSoft CI/CD - Deploy to All Environments

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 – Build, test, and publish to Exchange
  # ─────────────────────────────────────────────
  build:
    name: Build & Publish to Exchange
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Publish to Anypoint Exchange
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests \
            -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
            -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}"

  # ─────────────────────────────────────────────
  # JOB 2 – Deploy to Sandbox
  # GitHub Environment "Sandbox" controls approval
  # ─────────────────────────────────────────────
  deploy-sandbox:
    name: Deploy to Sandbox
    needs: build
    runs-on: ubuntu-latest
    environment: Sandbox          # add reviewers in GitHub → Settings → Environments
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Deploy to Sandbox
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests -DmuleDeploy \
            -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
            -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}" \
            -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
            -Dplatform.client_id="${{ secrets.PLATFORM_CLIENT_ID }}" \
            -Dplatform.client_secret="${{ secrets.PLATFORM_CLIENT_SECRET }}" \
            -Denv="${{ secrets.MULE_ENV }}"

  # ─────────────────────────────────────────────
  # JOB 3 – Deploy to Dev
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: deploy-sandbox
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Deploy to Dev
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests -DmuleDeploy \
            -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
            -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}" \
            -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
            -Dplatform.client_id="${{ secrets.PLATFORM_CLIENT_ID }}" \
            -Dplatform.client_secret="${{ secrets.PLATFORM_CLIENT_SECRET }}" \
            -Denv="${{ secrets.MULE_ENV }}"

  # ─────────────────────────────────────────────
  # JOB 4 – Deploy to QA
  # ─────────────────────────────────────────────
  deploy-qa:
    name: Deploy to QA
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Deploy to QA
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests -DmuleDeploy \
            -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
            -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}" \
            -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
            -Dplatform.client_id="${{ secrets.PLATFORM_CLIENT_ID }}" \
            -Dplatform.client_secret="${{ secrets.PLATFORM_CLIENT_SECRET }}" \
            -Denv="${{ secrets.MULE_ENV }}"

  # ─────────────────────────────────────────────
  # JOB 5 – Deploy to Production
  # Requires manual approval in GitHub UI
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: Production       # always put a required reviewer here
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Deploy to Production
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests -DmuleDeploy \
            -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
            -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}" \
            -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
            -Dplatform.client_id="${{ secrets.PLATFORM_CLIENT_ID }}" \
            -Dplatform.client_secret="${{ secrets.PLATFORM_CLIENT_SECRET }}" \
            -Denv="${{ secrets.MULE_ENV }}"
