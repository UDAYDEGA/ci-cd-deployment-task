name: Reusable Workflow To Deploy MuleSoft Application

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      # - name: Build JAR
      #   run: mvn clean package -DmuleDeploy

      - name: Publish to Exchange
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests \
            -Danypoint.username="${ANYPOINT_USERNAME}" \
            -Danypoint.password="${ANYPOINT_PASSWORD}"

  deploydev:
    needs: build
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Deploy to Dev
        run: |
          mvn deploy --settings .maven/settings.xml -DskipMunitTests -DmuleDeploy \
             -Danypoint.businessGroup="${BUSINESS_GROUP}" \
             -Danypoint.platform.client_id="${PLATFORM_CLIENT_ID}" \
             -Danypoint.platform.client_secret="${PLATFORM_CLIENT_SECRET}" \
             -Denv="${MULE_ENV}" 
